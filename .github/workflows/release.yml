name: Release

# Fully automated release driven by Conventional Commits.
# Every push to `main` runs the test+smoke gauntlet, then semantic-release:
#   1. Analyzes commits since the last git tag to compute the next version.
#   2. Bumps package.json, prepends release notes to CHANGELOG.md, and
#      commits them back to main with `[skip ci]` (no CI loop).
#   3. Tags the release and publishes a GitHub Release with generated notes.
#   4. Publishes to npm via OIDC Trusted Publishing — no NPM_TOKEN. npm
#      auto-attaches provenance attestations (the --provenance flag is
#      implicit under trusted publishing). Requires npm >= 11.5.1, which
#      Node 24 ships out of the box.
#      See https://docs.npmjs.com/trusted-publishers
#
# A push carrying only chore:/ci:/docs:/refactor:/test: commits produces
# "no release" — that is expected, not a failure.
on:
  push:
    branches: [main]

# Serialize releases so two quick pushes can't race to publish the same
# version. Never cancel an in-flight release mid-publish.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write        # push the version-bump commit + tag, create the Release
  id-token: write        # mint the OIDC token for npm Trusted Publishing + provenance
  issues: write          # semantic-release comments on resolved issues
  pull-requests: write   # semantic-release comments on merged PRs

jobs:
  release:
    name: semantic-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history — semantic-release reads all tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 24 (ships npm >= 11.5.1, needed for OIDC publishing)
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Bun (for `bun test`)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build LSP bundle
        run: bun run build

      - name: Run tests
        run: bun test ./tests

      - name: Run smokes
        run: bun run smoke

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Trusted Publishing handles npm auth via OIDC — no NPM_TOKEN.
          NPM_CONFIG_PROVENANCE: 'true'
        run: bunx semantic-release
